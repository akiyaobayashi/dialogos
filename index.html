<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>賢者たちとの対話 — Dialogos</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=IM+Fell+English:ital@0;1&family=Noto+Serif+JP:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./css/style.css">
  </head>
  <body>
    <div class="ornament-strip" aria-hidden="true"></div>
    <div class="app-shell">
      <header class="app-header">
        <button class="brand" data-route="list" aria-label="賢者一覧へ">
          <span class="brand-sigil">D</span>
          <span>
            <strong>Dialogos</strong>
            <small>賢者たちとの対話</small>
          </span>
        </button>
        <nav class="nav-actions" aria-label="メニュー">
          <button data-route="list">賢者一覧</button>
          <button id="openHistory">履歴</button>
          <button data-route="redeem">コード入力</button>
          <span class="meter"><b id="usageMeter">--</b></span>
        </nav>
      </header>
      <main id="app" class="view-root" aria-live="polite"></main>
    </div>
    <div class="ornament-strip" aria-hidden="true"></div>
    <script type="module" src="./js/app.js"></script>

    <div id="sidebarOverlay" class="sidebar-overlay" aria-hidden="true"></div>
    <aside id="historySidebar" class="history-sidebar" aria-label="対話の履歴" aria-hidden="true">
      <div class="sidebar-header">
        <span class="sidebar-title">対話の履歴</span>
        <button id="closeSidebar" class="sidebar-close" aria-label="閉じる">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M18 6L6 18M6 6l12 12"/></svg>
        </button>
      </div>
      <div id="sidebarContent" class="sidebar-content">
        <div class="sidebar-loading">
          <div class="thinking-dots"><span></span><span></span><span></span></div>
        </div>
      </div>
    </aside>
  </body>
</html>
